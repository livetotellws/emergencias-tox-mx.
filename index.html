        // ESAVI Data (simplified for example)

        // IndexedDB Helper Functions
        const openDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('ToxicoDB', 2);

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('especies')) {
                        const speciesStore = db.createObjectStore('especies', { keyPath: 'id' });
                        speciesStore.createIndex('nombre_comun', 'nombre_comun', { unique: false });
                        speciesStore.createIndex('clasificacion', 'clasificacion', { unique: false });
                        speciesStore.createIndex('nivel_toxicidad', 'nivel_toxicidad', { unique: false });
                    }
                    if (!db.objectStoreNames.contains('timers')) {
                        db.createObjectStore('timers', { keyPath: 'id', autoIncrement: true });
                    }
                    if (!db.objectStoreNames.contains('edema_markings')) {
                        db.createObjectStore('edema_markings', { keyPath: 'id', autoIncrement: true });
                    }
                };

                request.onsuccess = (event) => {
                    const db = event.target.result;
                    // Populate species data if empty
                    const transaction = db.transaction(['especies'], 'readwrite');
                    const store = transaction.objectStore('especies');
                    store.count().onsuccess = (e) => {
                        if (e.target.result === 0) {
                            SPECIES_DATABASE.forEach(sp => store.add(sp));
                        }
                    };
                    resolve(db);
                };

                request.onerror = (event) => {
                    reject('IndexedDB error: ' + event.target.errorCode);
                };
            });
        };

        const addData = async (storeName, data) => {
            const db = await openDB();
            const transaction = db.transaction([storeName], 'readwrite');
            const store = transaction.objectStore(storeName);
            return new Promise((resolve, reject) => {
                const request = store.add(data);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const getAllData = async (storeName) => {
            const db = await openDB();
            const transaction = db.transaction([storeName], 'readonly');
            const store = transaction.objectStore(storeName);
            return new Promise((resolve, reject) => {
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        // Componente de Cronómetro de Evolución Clínica
        function ClinicalTimer() {
            const [startTime, setStartTime] = useState(null);
            const [elapsedTime, setElapsedTime] = useState(0);
            const [isRunning, setIsRunning] = useState(false);
            const intervalRef = useRef(null);

            useEffect(() => {
                const loadTimer = async () => {
                    const timers = await getAllData('timers');
                    if (timers.length > 0) {
                        const latestTimer = timers[timers.length - 1];
                        setStartTime(latestTimer.startTime);
                        setElapsedTime(Date.now() - latestTimer.startTime);
                        setIsRunning(latestTimer.isRunning);
                    }
                };
                loadTimer();
            }, []);

            useEffect(() => {
                if (isRunning) {
                    intervalRef.current = setInterval(() => {
                        setElapsedTime(Date.now() - startTime);
                    }, 1000);
                } else {
                    clearInterval(intervalRef.current);
                }
                return () => clearInterval(intervalRef.current);
            }, [isRunning, startTime]);

            const startTimer = async () => {
                const now = Date.now();
                setStartTime(now);
                setIsRunning(true);
                await addData('timers', { startTime: now, isRunning: true });
            };

            const stopTimer = async () => {
                setIsRunning(false);
                await addData('timers', { startTime: startTime, isRunning: false, endTime: Date.now() });
            };

            const resetTimer = async () => {
                clearInterval(intervalRef.current);
                setStartTime(null);
                setElapsedTime(0);
                setIsRunning(false);
                // Optionally clear all timers from IndexedDB or add a new 'reset' entry
            };

            const formatTime = (ms) => {
                const totalSeconds = Math.floor(ms / 1000);
                const hours = Math.floor(totalSeconds / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;
                return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            };

            return (
                <div className="bg-purple-50 border-2 border-purple-500 rounded-lg p-4 mb-6">
                    <h3 className="text-lg font-bold text-purple-800 mb-3">⏱️ Cronómetro de Evolución Clínica</h3>
                    <div className="text-center mb-4">
                        <p className="text-5xl font-mono text-gray-900">{formatTime(elapsedTime)}</p>
                    </div>
                    <div className="flex justify-center space-x-4">
                        {!isRunning ? (
                            <button onClick={startTimer} className="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg font-semibold">Iniciar</button>
                        ) : (
                            <button onClick={stopTimer} className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-semibold">Detener</button>
                        )}
                        <button onClick={resetTimer} className="px-4 py-2 bg-gray-300 hover:bg-gray-400 text-gray-800 rounded-lg font-semibold">Reiniciar</button>
                    </div>
                    {startTime && <p className="text-center text-sm text-gray-600 mt-2">Inicio: {new Date(startTime).toLocaleString()}</p>}
                </div>
            );
        }

        // Componente de Marcaje de Edema
        function EdemaMarker() {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [marks, setMarks] = useState([]);

            useEffect(() => {
                const loadMarks = async () => {
                    const savedMarks = await getAllData('edema_markings');
                    setMarks(savedMarks);
                };
                loadMarks();
            }, []);

            const startDrawing = ({ nativeEvent }) => {
                const { offsetX, offsetY } = nativeEvent;
                setIsDrawing(true);
                const newMark = { x: offsetX, y: offsetY, timestamp: Date.now() };
                setMarks((prevMarks) => [...prevMarks, newMark]);
                addData('edema_markings', newMark);
            };

            const draw = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                marks.forEach(mark => {
                    ctx.beginPath();
                    ctx.arc(mark.x, mark.y, 5, 0, 2 * Math.PI);
                    ctx.fillStyle = 'red';
                    ctx.fill();
                });
            }, [marks]);

            useEffect(() => {
                draw();
            }, [draw]);

            const clearMarks = () => {
                setMarks([]);
                // Clear from IndexedDB
                openDB().then(db => {
                    const transaction = db.transaction(['edema_markings'], 'readwrite');
                    const store = transaction.objectStore('edema_markings');
                    store.clear();
                });
            };

            return (
                <div className="bg-yellow-50 border-2 border-yellow-500 rounded-lg p-4 mb-6">
                    <h3 className="text-lg font-bold text-yellow-800 mb-3">📏 Herramienta de Marcaje de Edema</h3>
                    <p className="text-sm text-gray-700 mb-2">Haz clic en el área de la imagen para marcar la progresión del edema. Se recomienda marcar cada 30 minutos.</p>
                    <div className="flex justify-center items-center bg-gray-100 p-2 rounded-md">
                        <canvas
                            ref={canvasRef}
                            width="300"
                            height="300"
                            className="canvas-container bg-white"
                            onMouseDown={startDrawing}
                            onTouchStart={startDrawing}
                        ></canvas>
                    </div>
                    <div className="flex justify-center mt-4">
                        <button onClick={clearMarks} className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-semibold">Borrar Marcas</button>
                    </div>
                </div>
            );
        }

        // Componente de Vigilancia de ESAVI
        function ESAVIMonitor() {
            const [searchTerm, setSearchTerm] = useState('');
            const filteredESAVI = ESAVI_DATA.filter(item =>
                item.evento.toLowerCase().includes(searchTerm.toLowerCase()) ||
                item.antiveneno.toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <div className="bg-red-50 border-2 border-red-500 rounded-lg p-4 mb-6">
                    <h3 className="text-lg font-bold text-red-800 mb-3">🚨 Módulo de Vigilancia de ESAVI</h3>
                    <input
                        type="text"
                        placeholder="Buscar evento o antiveneno..."
                        className="w-full px-3 py-2 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:border-red-600"
                        value={searchTerm}
                        onChange={(e) => setSearchTerm(e.target.value)}
                    />
                    <div className="space-y-3">
                        {filteredESAVI.length > 0 ? (
                            filteredESAVI.map(item => (
                                <div key={item.id} className="bg-white p-3 rounded-lg shadow-sm">

                                    <p className="text-sm text-gray-600">Antiveneno: {item.antiveneno}</p>

                                    <p className="text-sm text-gray-700 mt-1">Manejo: {item.manejo}</p>
                                </div>
                            ))

                            <p className="text-gray-600">No se encontraron ESAVI que coincidan con la búsqueda.</p>
                        )}
                    </div>
                </div>
            );
        }

        // Componente de Vista Detallada

                    default: return 'severity-leve';

            return (
                <div className="bg-white rounded-lg shadow-lg p-6">
                    <button
                        onClick={onBack}
                        className="mb-4 px-4 py-2 bg-gray-300 hover:bg-gray-400 text-gray-800 rounded-lg font-semibold transition"

                    <div className="grid md:grid-cols-3 gap-6">

                                <p className="text-gray-700 bg-blue-50 p-3 rounded-lg">

                                    {species.antiveno && (

                                    <p className="text-xs font-semibold text-yellow-800">⚠️ IMPORTANTE</p>
                                    <p className="text-xs text-yellow-900 mt-1">

        // Componente Modal para Aviso de Privacidad
        function PrivacyModal({ isOpen, onClose, children }) {
            if (!isOpen) return null;
            return (
                <div className="modal" onClick={onClose}>
                    <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                        <span className="modal-close-button" onClick={onClose}>&times;</span>
                        {children}
                    </div>
                </div>
            );
        }

        // Componente principal
        function ToxicoPWA() {
            const [species, setSpecies] = useState([]);
            const [filteredSpecies, setFilteredSpecies] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedSpecies, setSelectedSpecies] = useState(null);
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [isPrivacyModalOpen, setIsPrivacyModalOpen] = useState(false);

            useEffect(() => {
                const initApp = async () => {
                    await openDB(); // Ensure DB is open and populated
                    const allSpecies = await getAllData('especies');
                    setSpecies(allSpecies);
                    setFilteredSpecies(allSpecies);
                };
                initApp();
            }, []);

            // Manejar búsqueda
            useEffect(() => {
                if (searchTerm.trim() === '') {
                    setFilteredSpecies(species);
                } else {
                    const term = searchTerm.toLowerCase();
                    const filtered = species.filter(sp =>
                        sp.nombre_comun.toLowerCase().includes(term) ||
                        sp.nombre_cientifico.toLowerCase().includes(term) ||
                        sp.clasificacion.toLowerCase().includes(term)
                    );
                    setFilteredSpecies(filtered);
                }
            }, [searchTerm, species]);

                const handleOnline = () => { setIsOnline(true); document.getElementById('offline-indicator').classList.remove('show'); };
                const handleOffline = () => { setIsOnline(false); document.getElementById('offline-indicator').classList.add('show'); };

                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);

                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            // Registrar Service Worker
            useEffect(() => {
                if ('serviceWorker' in navigator) {
                    window.addEventListener('load', async () => {
                        try {
                            const reg = await navigator.serviceWorker.register('/sw.js');
                            console.log('✅ Service worker registrado con éxito', reg);
                        } catch (err) {
                            console.log('❌ Fallo en el registro del Service worker', err);
                        }
                    });
                }
            }, []);

            const privacyNoticeContent = `
                # Aviso de Privacidad Integral - Emergencias Tox MX\n\n**Fecha de última actualización:** 17 de marzo de 2026\n\n**Responsable del Tratamiento de Datos Personales:**\nDr. Carlos Antonio Camarillo Gutierrez\nDomicilio Legal: Privada Rincon de la Cruz, No. 12, Avenida Forjadores 1021, San Pedro Cholula, Puebla.\nContacto de Privacidad: Tel: 2215579943 / WhatsApp: 2221044565.\n\nEn adelante, "Emergencias Tox MX" o "la Aplicación", reconoce la importancia de la privacidad y la seguridad de los datos personales de sus usuarios, especialmente aquellos relacionados con la salud. Este Aviso de Privacidad Integral se emite en cumplimiento de la Ley Federal de Protección de Datos Personales en Posesión de los Particulares (LFPDPPP) y su Reglamento.\n\n## 1. Datos Personales Recabados\n\nLa Aplicación "Emergencias Tox MX" está diseñada para ser una herramienta de consulta y apoyo clínico. **No recaba, almacena ni procesa datos personales identificables de los usuarios en servidores externos.** Todos los datos generados por el usuario, incluyendo:\n\n*   **Información de interacción con la aplicación:** Selecciones de especies, grados de severidad, resultados de cálculos de faboterapia, registros de cronómetro, y marcaciones de edema.\n*   **Datos de salud sensibles:** Aunque la aplicación no solicita directamente datos de salud identificables, la información generada por el usuario al interactuar con la calculadora de faboterapia o el cronómetro de evolución clínica podría, en un contexto clínico específico, ser considerada dato sensible. Es crucial reiterar que esta información **se guarda exclusivamente de forma local en el dispositivo del usuario (IndexedDB)** y no es transmitida ni almacenada por el Responsable.\n\n## 2. Finalidades del Tratamiento de Datos\n\nLos datos generados por el usuario y almacenados localmente en su dispositivo tienen como única finalidad:\n\n*   **Proveer las funcionalidades de la Aplicación:** Permitir el uso de la calculadora de faboterapia, el cronómetro de evolución clínica, el módulo de vigilancia de ESAVI y la herramienta de marcaje de edema.\n*   **Mejorar la experiencia del usuario:** Facilitar el acceso rápido a la información y herramientas clínicas sin depender de una conexión a internet.\n\n**"Emergencias Tox MX" no utiliza los datos personales para fines de mercadotecnia, publicidad, prospección comercial ni para la toma de decisiones automatizadas.**\n\n## 3. Mecanismos para el Ejercicio de Derechos ARCO y Revocación del Consentimiento\n\nDado que la Aplicación no recaba ni almacena datos personales en servidores del Responsable, el ejercicio de los derechos de Acceso, Rectificación, Cancelación y Oposición (Derechos ARCO), así como la revocación del consentimiento, se gestiona directamente por el usuario a través de las funcionalidades de su propio dispositivo y navegador web. Esto incluye:\n\n*   **Acceso y Rectificación:** La información generada puede ser consultada y modificada por el usuario dentro de la aplicación.\n*   **Cancelación y Oposición:** La eliminación de los datos almacenados localmente se puede realizar borrando los datos de navegación del navegador o desinstalando la Aplicación del dispositivo. Esto eliminará toda la información generada y almacenada por "Emergencias Tox MX" en el IndexedDB de su dispositivo.\n\nPara cualquier duda o asistencia relacionada con la gestión de sus datos locales, puede contactar al Responsable a través de los datos de contacto proporcionados al inicio de este aviso.\n\n## 4. Transferencias de Datos Personales\n\n**"Emergencias Tox MX" no realiza transferencias de datos personales a terceros, nacionales o internacionales.** Toda la información se mantiene en el dispositivo del usuario.\n\n## 5. Medidas de Seguridad\n\nLa Aplicación, al operar bajo un modelo de almacenamiento local, minimiza los riesgos asociados a la transmisión y almacenamiento centralizado de datos. Las medidas de seguridad implementadas se centran en la robustez del diseño de la aplicación para evitar la recolección no intencionada de datos y en la transparencia sobre el manejo local de la información.\n\n## 6. Cambios al Aviso de Privacidad\n\nEl presente Aviso de Privacidad puede sufrir modificaciones, cambios o actualizaciones derivadas de nuevos requerimientos legales, de nuestras propias necesidades por los productos o servicios que ofrecemos, de nuestras prácticas de privacidad, de cambios en nuestro modelo de negocio, o por otras causas. Nos comprometemos a mantenerlo informado sobre los cambios que pueda sufrir el presente aviso de privacidad, a través de la publicación de la versión actualizada en la propia Aplicación.\n\nLe recomendamos revisar periódicamente este Aviso de Privacidad para estar informado sobre cómo protegemos su información.
            `;

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <header className="bg-gradient-to-r from-blue-600 to-blue-800 text-white shadow-lg">
                        <div className="max-w-6xl mx-auto px-4 py-6">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="text-3xl">⚕️</div>
                                    <div>
                                        <h1 className="text-2xl font-bold">Guía Toxicológica</h1>
                                        <p className="text-blue-100 text-sm">Emergencias Médicas en México</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <div className={`text-sm font-semibold ${isOnline ? 'text-green-300' : 'text-yellow-300'}`}>
                                        {isOnline ? '🟢 Online' : '🔴 Offline'}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-6xl mx-auto px-4 py-8">
                        {selectedSpecies ? (
                            <DetailView 
                                species={selectedSpecies} 
                                onBack={() => setSelectedSpecies(null)} 
                            />
                        ) : (
                            <>
                                {/* Búsqueda */}
                                <div className="mb-8">
                                    <div className="relative">
                                        <input
                                            type="text"
                                            placeholder="Buscar por nombre común, científico o clasificación..."

                                            onChange={(e) => setSearchTerm(e.target.value)}

                            </p>
                            <p className="mb-1">
                                Domicilio Legal: Privada Rincon de la Cruz, No. 12, Avenida Forjadores 1021, San Pedro Cholula, Puebla.
                            </p>
                            <p className="mb-2">
                                Contacto de Privacidad: Tel: 2215579943 / WhatsApp: 2221044565.

                                📚 Guía Toxicológica PWA v1.0 | Basada en GPC, NOM-033, Manuales SINAVE 2024 y Redtox
                            </p>
                            <p className="text-xs text-gray-500 mt-1">
                                ⚠️ Esta aplicación es una herramienta de referencia. En emergencias, contacte al 911 o al Centro de Toxicología Regional.
                            </p>
                        </div>
                    </footer>

                    {/* Modal de Aviso de Privacidad */}
                    <PrivacyModal isOpen={isPrivacyModalOpen} onClose={() => setIsPrivacyModalOpen(false)}>
                        <div className="prose max-w-none" dangerouslySetInnerHTML={{ __html: marked.parse(privacyNoticeContent) }}></div>
                    </PrivacyModal>
                </div>
            );
        }

        // Marked.js for Markdown parsing
        // Load marked.js from CDN
        const script = document.createElement('script');
        script.src = "https://cdn.jsdelivr.net/npm/marked/marked.min.js";
        script.onload = () => {
            // Renderizar aplicación una vez que marked.js esté cargado
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<ToxicoPWA />);

        document.head.appendChild(script);
